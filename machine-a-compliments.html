<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machine à Compliments</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }

        h1 {
            color: white;
            font-size: 2rem;
            margin-bottom: 2rem;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
            text-align: center;
        }

        .machine {
            background: linear-gradient(145deg, #ff6b9d, #ff8a80);
            padding: 40px;
            border-radius: 30px;
            box-shadow:
                0 20px 60px rgba(0,0,0,0.3),
                inset 0 5px 20px rgba(255,255,255,0.3);
            position: relative;
        }

        .machine::before {
            content: "JACKPOT D'AMOUR";
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: #ffd700;
            color: #8b0000;
            padding: 8px 25px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(255,215,0,0.5);
        }

        .slots-container {
            display: flex;
            gap: 15px;
            background: #1a1a2e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: inset 0 5px 20px rgba(0,0,0,0.5);
        }

        .slot {
            width: 80px;
            height: 100px;
            background: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
        }

        .slot span {
            transition: transform 0.1s;
        }

        .slot.spinning span {
            animation: spin 0.1s linear infinite;
        }

        @keyframes spin {
            0% { transform: translateY(-100%); opacity: 0; }
            50% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(100%); opacity: 0; }
        }

        .lever-container {
            position: absolute;
            right: -30px;
            top: 50%;
            transform: translateY(-50%);
        }

        .lever {
            width: 25px;
            height: 80px;
            background: linear-gradient(90deg, #c0c0c0, #808080);
            border-radius: 5px;
            position: relative;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .lever::after {
            content: "";
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 35px;
            height: 35px;
            background: radial-gradient(circle at 30% 30%, #ff4444, #aa0000);
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .lever.pulled {
            transform: rotate(30deg);
        }

        .btn {
            margin-top: 25px;
            padding: 18px 50px;
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            background: linear-gradient(145deg, #00c853, #009624);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,200,83,0.4);
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0,200,83,0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background: #666;
            cursor: not-allowed;
            box-shadow: none;
        }

        .result {
            margin-top: 30px;
            padding: 25px 40px;
            background: white;
            border-radius: 20px;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .result.show {
            opacity: 1;
            transform: scale(1);
        }

        .result.jackpot {
            background: linear-gradient(145deg, #ffd700, #ffec8b);
            animation: jackpotPulse 0.5s ease-in-out infinite alternate;
        }

        @keyframes jackpotPulse {
            from { box-shadow: 0 0 20px #ffd700, 0 0 40px #ffd700; }
            to { box-shadow: 0 0 40px #ffd700, 0 0 80px #ffd700; }
        }

        .result p {
            font-size: 1.2rem;
            color: #333;
            line-height: 1.6;
        }

        .result.jackpot p {
            color: #8b0000;
            font-weight: bold;
        }

        .hearts {
            position: fixed;
            pointer-events: none;
        }

        .heart {
            position: absolute;
            font-size: 2rem;
            animation: floatUp 3s ease-out forwards;
            opacity: 0;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
                transform: scale(1);
            }
            100% {
                transform: translateY(-100vh) rotate(720deg) scale(0.5);
                opacity: 0;
            }
        }

        .counter {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 15px;
            color: white;
            font-size: 1rem;
        }

        .counter span {
            font-weight: bold;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="counter">
        Compliments reçus : <span id="count">0</span>
    </div>

    <h1>Ta Machine à Compliments</h1>

    <div class="machine">
        <div class="slots-container">
            <div class="slot" id="slot1"><span>❤️</span></div>
            <div class="slot" id="slot2"><span>💖</span></div>
            <div class="slot" id="slot3"><span>💕</span></div>
        </div>
        <div class="lever-container">
            <div class="lever" id="lever"></div>
        </div>
    </div>

    <button class="btn" id="spinBtn">Tirer !</button>

    <div class="result" id="result">
        <p id="compliment"></p>
    </div>

    <div class="hearts" id="hearts"></div>

    <script>
        const symbols = ['❤️', '💖', '💕', '✨', '🌟', '💫', '🔥', '💝', '💗'];

        const compliments = [
            "T'es la plus belle chose qui me soit arrivée 💕",
            "Ton sourire pourrait alimenter une ville entière en électricité ⚡",
            "Si t'étais un WiFi, tu serais 'Pretty Fly for a WiFi' 📶",
            "T'es tellement canon que mon téléphone surchauffe quand je vois tes photos 🔥",
            "Je t'aime plus que le dernier épisode d'une série 📺",
            "T'es mon fond d'écran préféré (et celui de mon coeur) 💗",
            "Si l'amour était un crime, je voudrais être condamné à perpétuité avec toi 🔒",
            "T'es la raison pour laquelle je souris comme un débile dans le métro 😊",
            "Mon coeur fait du parkour à chaque fois que je te vois 🏃‍♂️",
            "T'es plus addictive que mon téléphone (et c'est pas peu dire) 📱",
            "Si t'étais une pizza, tu serais une pizza... parfaite. Voilà. 🍕",
            "Je t'aime plus que les soldes de janvier ❤️",
            "T'es le dessert de ma vie (et j'ai toujours de la place pour le dessert) 🍰",
            "Mon amour pour toi est comme mes données mobiles : illimité 📶",
            "T'es tellement incroyable que même Siri est jalouse 🤖",
        ];

        const jackpotCompliments = [
            "🎰 JACKPOT ! 🎰\n\nT'es littéralement la personne la plus incroyable de l'univers et j'ai trop de chance de t'avoir. Je t'aime à l'infini et au-delà ! 🚀💕",
            "🎰 JACKPOT ! 🎰\n\nTu viens de débloquer le niveau maximum d'amour ! Récompense : des câlins illimités à vie 🤗💝",
            "🎰 JACKPOT ! 🎰\n\nFélicitations ! Tu as gagné... mon coeur pour toujours ! (Pas de retour possible, désolé) 💖✨",
        ];

        let count = 0;
        let isSpinning = false;

        const slots = [
            document.getElementById('slot1'),
            document.getElementById('slot2'),
            document.getElementById('slot3')
        ];
        const btn = document.getElementById('spinBtn');
        const lever = document.getElementById('lever');
        const result = document.getElementById('result');
        const complimentEl = document.getElementById('compliment');
        const countEl = document.getElementById('count');
        const heartsContainer = document.getElementById('hearts');

        function getRandomSymbol() {
            return symbols[Math.floor(Math.random() * symbols.length)];
        }

        function createHeart(x, y) {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.textContent = ['❤️', '💕', '💖', '💗', '✨'][Math.floor(Math.random() * 5)];
            heart.style.left = x + 'px';
            heart.style.top = y + 'px';
            heartsContainer.appendChild(heart);
            setTimeout(() => heart.remove(), 3000);
        }

        function explodeHearts() {
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    createHeart(
                        Math.random() * window.innerWidth,
                        window.innerHeight
                    );
                }, i * 50);
            }
        }

        async function spin() {
            if (isSpinning) return;
            isSpinning = true;
            btn.disabled = true;
            lever.classList.add('pulled');
            result.classList.remove('show', 'jackpot');

            // Spin animation
            slots.forEach(slot => slot.classList.add('spinning'));

            const finalSymbols = [];

            // Stop each slot with delay
            for (let i = 0; i < 3; i++) {
                await new Promise(resolve => setTimeout(resolve, 500 + i * 400));
                slots[i].classList.remove('spinning');
                const symbol = getRandomSymbol();
                finalSymbols.push(symbol);
                slots[i].querySelector('span').textContent = symbol;
            }

            lever.classList.remove('pulled');

            // Check for jackpot (3 same symbols)
            const isJackpot = finalSymbols[0] === finalSymbols[1] && finalSymbols[1] === finalSymbols[2];

            // Show compliment
            setTimeout(() => {
                if (isJackpot) {
                    complimentEl.textContent = jackpotCompliments[Math.floor(Math.random() * jackpotCompliments.length)];
                    result.classList.add('jackpot');
                    explodeHearts();
                } else {
                    complimentEl.textContent = compliments[Math.floor(Math.random() * compliments.length)];
                }
                result.classList.add('show');
                count++;
                countEl.textContent = count;

                // Small heart burst
                if (!isJackpot) {
                    for (let i = 0; i < 5; i++) {
                        createHeart(
                            window.innerWidth / 2 + (Math.random() - 0.5) * 200,
                            window.innerHeight / 2
                        );
                    }
                }

                isSpinning = false;
                btn.disabled = false;
            }, 300);
        }

        btn.addEventListener('click', spin);
        lever.addEventListener('click', spin);

        // Easter egg: Konami code for mega jackpot
        let konamiCode = [];
        const konamiSequence = ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight', 'b', 'a'];

        document.addEventListener('keydown', (e) => {
            konamiCode.push(e.key);
            konamiCode = konamiCode.slice(-10);
            if (konamiCode.join(',') === konamiSequence.join(',')) {
                complimentEl.textContent = "🌟 CODE SECRET DÉBLOQUÉ ! 🌟\n\nTu es officiellement la meilleure copine de tous les temps, de toutes les dimensions, de tous les univers parallèles. C'est scientifiquement prouvé. Je t'aime ! 💕🚀✨";
                result.classList.add('show', 'jackpot');
                explodeHearts();
                explodeHearts();
            }
        });
    </script>
</body>
</html>
